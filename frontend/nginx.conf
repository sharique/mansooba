server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Emit relative Location headers on redirects so the port is preserved
    # when the container is accessed via a mapped port (e.g. 3000:80).
    absolute_redirect off;

    # SPA routing — non-file paths fall back to index.html so that
    # client-side Vue Router handles navigation without 404s.
    #
    # Deliberately omits the `$uri/` alternative: `nuxt generate` prerenders
    # every route as a directory (e.g. reset-password/index.html), and
    # matching `$uri/` makes nginx emit an implicit 301 adding a trailing
    # slash before serving it. Vue Router then sees "/reset-password/"
    # instead of "/reset-password", which fails the exact-string publicRoutes
    # check in auth.global.ts/auth.init.client.ts and sends unauthenticated
    # visitors to /login — this is exactly how a password-reset link clicked
    # from an email client (a hard, trailing-slash-less GET) broke. Since
    # Vue Router owns all routing client-side anyway, every request should
    # just get index.html directly, with no directory-based detour.
    location / {
        try_files $uri /index.html;
    }

    # Reverse-proxy all /api/ traffic to the backend container.
    # Docker Compose's internal DNS resolves "backend" to the backend service IP.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
