      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SprintResponse'
        "403":
          description: Insufficient role
          schema:
            $ref: '#/definitions/apierror.APIError'
        "404":
          description: next_sprint_id not found
          schema:
            $ref: '#/definitions/apierror.APIError'
        "409":
