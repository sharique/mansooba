# Dev compose stack — builds images locally, uses SQLite for zero-config startup.
#
# Usage:
#   docker compose up --build
#
# The frontend proxies /api/ to the backend via nginx (see frontend/nginx.conf),
# so the browser never needs direct access to port 8080.

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_DRIVER: sqlite
      DB_DSN: /data/dev.db
      JWT_SECRET: dev-secret-change-me
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      LOG_LEVEL: debug
      CORS_ORIGINS: "http://localhost:3000"
      STORAGE_ENDPOINT: "http://localstack:4566"
      # PresignEndpoint overrides the host baked into presigned download URLs.
      # The backend container reaches LocalStack via the Docker-internal
      # hostname above, but the browser that follows those URLs runs on the
      # host machine and needs "localhost" instead.
      STORAGE_PRESIGN_ENDPOINT: "http://localhost:4566"
      STORAGE_BUCKET: "mansooba-attachments"
      STORAGE_ACCESS_KEY_ID: "test"
      STORAGE_SECRET_ACCESS_KEY: "test"
      STORAGE_REGION: "us-east-1"
      STORAGE_PRESIGN_TTL: "1h"
      STORAGE_USE_PATH_STYLE: "true"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@mansooba.local
      APP_BASE_URL: "http://localhost:3000"
    volumes:
      - sqlite_data:/data
    depends_on:
      localstack-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_BASE_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      ACTIVATE_PRO: "0"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  localstack-init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url http://localstack:4566 s3api head-bucket --bucket mansooba-attachments 2>/dev/null ||
      aws --endpoint-url http://localstack:4566 s3 mb s3://mansooba-attachments --region us-east-1 &&
      echo 'bucket ready'
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP — backend sends here when email is configured
      - "8025:8025" # Web inbox — http://localhost:8025
    restart: unless-stopped

volumes:
  sqlite_data:
  localstack_data:
