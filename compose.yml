# Dev compose stack — builds images locally, uses SQLite for zero-config startup.
#
# Usage:
#   docker compose up --build
#
# The frontend proxies /api/ to the backend via nginx (see frontend/nginx.conf),
# so the browser never needs direct access to port 8080.

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_DRIVER: sqlite
      DB_DSN: /data/dev.db
      JWT_SECRET: dev-secret-change-me
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      LOG_LEVEL: debug
      CORS_ORIGINS: "http://localhost:3000"
      STORAGE_ENDPOINT: "http://minio:9000"
      STORAGE_BUCKET: "mansooba"
      STORAGE_ACCESS_KEY_ID: "minioadmin"
      STORAGE_SECRET_ACCESS_KEY: "minioadmin"
      STORAGE_REGION: "us-east-1"
      STORAGE_PRESIGN_TTL: "1h"
      STORAGE_USE_PATH_STYLE: "true"
    volumes:
      - sqlite_data:/data
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_BASE_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/mansooba &&
      echo 'bucket ready'
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP — backend sends here when email is configured
      - "8025:8025"   # Web inbox — http://localhost:8025
    restart: unless-stopped

volumes:
  sqlite_data:
  minio_data:
