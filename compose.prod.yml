# Production compose stack — pulls images from GHCR, connects to external PostgreSQL.
#
# Usage:
#   cp backend/.env.example .env   # fill in DB_DSN, JWT_SECRET, etc.
#   docker compose -f compose.prod.yml up -d
#
# Secrets are kept in .env (not in this file) to prevent exposure via
# `docker inspect` or accidental version-control inclusion.

services:
  backend:
    image: ghcr.io/sharique/mansooba-backend:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/sharique/mansooba-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
